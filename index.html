<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shunya Nakabayashi - Live Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#top" class="nav-brand">Shunya Nakabayashi</a>
      <button class="nav-toggle" id="navToggle" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="#top">HOME</a></li>
        <li><a href="#schedule">LIVE SCHEDULE</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero" id="top">
    <div class="hero-content">
      <h1 class="hero-name">Shunya Nakabayashi</h1>
      <p class="hero-subtitle">Alto Saxophone</p>
    </div>
  </header>

  <main>
    <!-- Live Schedule -->
    <section id="schedule" class="section">
      <h2 class="section-title">LIVE SCHEDULE</h2>

      <div id="loading" class="loading">読み込み中...</div>
      <div id="no-events" class="no-events" style="display:none;">
        現在、予定されているライブはありません。
      </div>

      <!-- Upcoming events (grouped by month) -->
      <div id="upcoming-container"></div>

      <!-- Past lives -->
      <div class="past-section">
        <h3 class="past-title">Past Live</h3>
        <div id="past-container"></div>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>&copy; 2026 Shunya Nakabayashi. All rights reserved.</p>
  </footer>

  <script src="config.js"></script>
  <script src="script.js"></script>

  <!-- 埋め込みモード：?embed=1 のとき nav・hero・footer を非表示にし、高さを親に通知 -->
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      if (params.get("embed") === "1") {
        document.body.classList.add("embed-mode");

        // スケジュール描画後に iframe 高さを親ウィンドウへ通知（Wix 自動リサイズ対応）
        function notifyHeight() {
          const h = document.body.scrollHeight;
          window.parent.postMessage({ type: "iframeHeight", height: h }, "*");
        }
        // 初回 + データ読み込み後 + 1秒後の計3回通知
        notifyHeight();
        window.addEventListener("load", notifyHeight);
        setTimeout(notifyHeight, 1500);
      }
    })();
  </script>
</body>
</html>
